<!DOCTYPE html>
<html>
<head>
  <title>MiniRAFT Drawing Board</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { background: #fff; display: block; }
    body { margin: 0; overflow: hidden; background: #121212; }

    canvas { background: #111; display: block; }

    #statusPanel {
    position: fixed;
    top: 70px;
    left: 10px;
    background: rgba(20,20,20,0.9);
    padding: 10px;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    min-width: 220px;
  }

    #toolbar {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(30,30,30,0.9);
      padding: 10px;
      border-radius: 10px;
      color: white;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  font-family: 'Inter', sans-serif;
}

/* Canvas */
canvas {
  background: transparent;
  display: block;
}

/* Toolbar */
#toolbar {
  position: fixed;
  top: 20px;
  left: 20px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 12px 16px;
  border-radius: 14px;
  display: flex;
  gap: 12px;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

/* Status Panel */
#statusPanel {
  position: fixed;
  top: 100px;
  left: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 16px;
  border-radius: 14px;
  color: white;
  min-width: 260px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

  /* Title */
  .status-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  /* Replica Row */
  .replica {
    display: flex;
    justify-content: space-between;
    padding: 6px 8px;
    border-radius: 8px;
    margin-bottom: 5px;
    transition: 0.2s;
  }

  .replica:hover {
    background: rgba(255,255,255,0.05);
  }

  /* Badges */
  .badge {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
  }

  .leader {
    background: #4CAF50;
  }

  .follower {
    background: #555;
  }

  .candidate {
    background: #FFC107;
  }

  .down {
    background: #f44336;
  }

  .leader {
    background: #4CAF50;
    box-shadow: 0 0 10px rgba(76,175,80,0.7);
  }

  .replica {
    transition: all 0.2s ease;
  }
  </style>
</head>
<body>
<div id="toolbar">
  <input type="color" id="colorPicker">
  <input type="range" id="brushSize" min="1" max="10" value="2">
  <button id="clearBtn">Clear</button>
</div>
<canvas id="board"></canvas>
<div id="statusPanel"></div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drawing = false;
let lastX = 0;
let lastY = 0;

// CONFIG
let userColor = sessionStorage.getItem("color");

if (!userColor) {
  userColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
  sessionStorage.setItem("color", userColor);
}

let width = 2;

// 🔌 CONNECT TO GATEWAY
const wsHost = window.location.hostname || 'localhost';
const ws = new WebSocket(`ws://${wsHost}:8080`);

ws.onopen = () => {
  console.log("Connected to gateway");
  ws.send(JSON.stringify({ type: "init_request" }));
  
};

ws.onmessage = (event) => {
  const msg = JSON.parse(event.data);

  if (msg.type === "stroke") {
    if (msg.payload.clear) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    } else {
      drawLine(msg.payload);
    }
  }

  if (msg.type === "init") {
    if (!msg.strokes) return;

    msg.strokes.forEach(entry => {
      if (entry.stroke?.clear) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      } else {
        drawLine(entry.stroke);
      }
    });
  }
};

ws.onclose = () => {
  console.log("WebSocket disconnected");
};

ws.onerror = (err) => {
  console.log("WebSocket error", err);
};

// ✏️ DRAW FUNCTION
function drawLine({ x0, y0, x1, y1, color, width }) {
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.stroke();
}

// 🖱️ MOUSE EVENTS
canvas.addEventListener("mousedown", (e) => {
  drawing = true;
  lastX = e.clientX;
  lastY = e.clientY;
});

canvas.addEventListener("mousemove", (e) => {
  if (!drawing) return;

  const x = e.clientX;
  const y = e.clientY;

  const stroke = {
    type: "stroke",
    payload: {
      x0: lastX,
      y0: lastY,
      x1: x,
      y1: y,
      color: userColor,
      width
    }
  };

  // draw locally immediately (smooth UX)
  drawLine(stroke.payload);

  // send to backend
  ws.send(JSON.stringify(stroke));

  lastX = x;
  lastY = y;
});

canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mouseleave", () => drawing = false);

// 📱 TOUCH SUPPORT
canvas.addEventListener("touchstart", (e) => {
  const touch = e.touches[0];
  drawing = true;
  lastX = touch.clientX;
  lastY = touch.clientY;
});

canvas.addEventListener("touchmove", (e) => {
  if (!drawing) return;

  const touch = e.touches[0];
  const x = touch.clientX;
  const y = touch.clientY;

  const stroke = {
    type: "stroke",
    payload: {
      x0: lastX,
      y0: lastY,
      x1: x,
      y1: y,
      color: userColor,
      width
    }
  };

  drawLine(stroke.payload);
  ws.send(JSON.stringify(stroke));

  lastX = x;
  lastY = y;
});

canvas.addEventListener("touchend", () => drawing = false);

const colorPicker = document.getElementById("colorPicker");
const brushSize = document.getElementById("brushSize");
const clearBtn = document.getElementById("clearBtn");

colorPicker.value = userColor;

colorPicker.addEventListener("input", () => {
  userColor = colorPicker.value;
  localStorage.setItem("color", userColor);
});

brushSize.addEventListener("input", () => {
  width = brushSize.value;
});

clearBtn.addEventListener("click", () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);  // clear locally immediately
  ws.send(JSON.stringify({ type: "stroke", payload: { clear: true } }));
});

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
}, { passive: false });

const replicas = [
  "http://localhost:3001",
  "http://localhost:3002",
  "http://localhost:3003",
  "http://localhost:3004"
];

let lastLeader = null;

async function fetchStatus() {
  const panel = document.getElementById("statusPanel");

  let html = `<div class="status-title">⚡ Cluster Status</div>`;
  let currentLeader = null;

  for (const url of replicas) {
    try {
      const res = await fetch(`${url}/status`);
      const data = await res.json();

      let roleClass = "follower";
      let label = "Follower";

      if (data.role === "leader") {
        roleClass = "leader";
        label = "Leader 👑";
        currentLeader = data.nodeId;
      }

      if (data.role === "candidate") {
        roleClass = "candidate";
        label = "Candidate";
      }

      html += `
        <div class="replica">
          <span>${data.nodeId}</span>
          <span class="badge ${roleClass}">${label}</span>
        </div>
      `;

    } catch {
      html += `
        <div class="replica">
          <span>${url.split(":").pop()}</span>
          <span class="badge down">DOWN ❌</span>
        </div>
      `;
    }
  }

  if (currentLeader !== lastLeader) {
    html += `<div style="margin-top:10px;font-size:12px;opacity:0.7">
      Leader changed → ${currentLeader}
    </div>`;
    lastLeader = currentLeader;
  }

  panel.innerHTML = html;
}

setInterval(fetchStatus, 1000);
fetchStatus();
</script>

</body>
</html>
